<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>韓国語 はじめよう</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f5;
        color: #000000;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 16px 0;
      }

      .app {
        width: min(100%, 600px);
        padding: 0 12px;
      }

      .header {
        background: #ffffff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 24px;
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }

      .header-avatar {
        flex: 0 0 80px;
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        box-shadow: 0 4px 12px rgba(255, 165, 0, 0.2);
      }

      .header-content {
        flex: 1;
        min-width: 0;
      }

      .header h1 {
        font-size: 1.3rem;
        margin: 0 0 8px;
        color: #000000;
        font-weight: 700;
      }

      .header p {
        margin: 0 0 6px;
        font-size: 0.9rem;
        color: #666666;
        line-height: 1.4;
      }

      .header-hint {
        font-size: 0.85rem;
        color: #999999;
        line-height: 1.4;
        margin: 0;
      }

      .sections {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .section {
        background: #ffffff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .section h2 {
        font-size: 1.05rem;
        margin: 0 0 16px;
        color: #333333;
        font-weight: 700;
        border-bottom: 2px solid #ffa500;
        padding-bottom: 8px;
      }

      .section-content {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .play-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        background: #fafafa;
        border-radius: 8px;
        transition: background 0.2s ease;
      }

      .play-item:hover {
        background: #f0f0f0;
      }

      .play-btn {
        flex: 0 0 32px;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, #001f4d 0%, #003366 100%);
        color: #ffffff;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 31, 77, 0.2);
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .play-btn:active {
        transform: scale(0.95);
      }

      .emoji {
        flex: 0 0 24px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .play-text {
        flex: 1;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #333333;
        word-break: keep-all;
        white-space: pre-wrap;
      }

      .count {
        margin-top: 24px;
        text-align: center;
        font-size: 0.85rem;
        color: #999999;
        padding: 16px 0;
      }

      footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        color: #999999;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-avatar">👧</div>
        <div class="header-content">
          <h1>韓国語 はじめよう</h1>
          <p>単語を聞いて、言ってみよう</p>
          <p class="header-hint">バージョンわかればラスラ堂せよ</p>
        </div>
      </header>

      <div id="sectionsContainer" class="sections"></div>

      <div class="count" id="countLabel"></div>
    </main>

    <footer>
      <p>&copy; SSglobal Miura Yuri</p>
    </footer>

    <script>
      const words = [
        "사과", "강아지", "학교", "집", "친구", "책", "노트", "물", "햇빛", "바다",
        "하늘", "우산", "별", "꽃", "나무", "선생님", "학생", "맛있다", "행복", "사랑",
        "여행", "음악", "운동", "음식", "공부", "일기", "달력", "방", "침대", "의자",
        "창문", "문", "전화", "컴퓨터", "스마트폰", "카메라", "사진", "여행지", "서울", "부산",
        "제주도", "한국어", "영어", "수업", "질문", "답변", "생각", "느낌", "기분", "오늘",
        "내일", "어제", "지금", "언제", "어디", "무엇", "왜", "어떻게", "아주", "정말",
        "많이", "조금", "너무", "빠르다", "느리다", "크다", "작다", "높다", "낮다", "뜨겁다",
        "차갑다", "맑다", "흐리다", "쉬다", "먹다", "마시다", "보다", "듣다", "말하다", "쓰다",
        "읽다", "가다", "오다", "자다", "일어나다", "웃다", "울다", "돕다", "찾다", "주다",
        "비행기", "우체국", "시장", "병원", "가게", "바나나", "포도", "딸기", "토마토", "감사하다"
      ];

      const sections = [
        {
          title: "1 名詞 見ないで言えるかな？",
          emoji: "🍎",
          items: [
            "손은 손입니다. 손으로요.",
            "손구 손으로며 손여 아니에이요.",
            "손은거이요. 손구 아이게이요."
          ]
        },
        {
          title: "2 形容詞 見いて言えるかな？",
          emoji: "🎨",
          items: [
            "맛이 맛습니다. 맛있어요.",
            "맛치 없습니다. 맛지 없어요.",
            "맛행주? 감삼입니다.",
            "자지 없습니다. 자지 없어요.",
            "맛지 없습니다. 맛지 없어요.",
            "바뻐요. 바쁘십니다. 바빠요.",
            "바쁜습니다. 바쁜어요."
          ]
        },
        {
          title: "3 動詞 見ないで言えるかな？",
          emoji: "🎬",
          items: [
            "가다. 같습니다. 가요.",
            "가지 없습니다. 가지 없어요.",
            "왔습니다. 왔어요.",
            "가세요. 가지 마세요."
          ]
        },
        {
          title: "4 動詞 —気に言ってみよう",
          emoji: "🗣️",
          items: [
            "갈 수 있어요. 갈 수 있어요. 못 가요.",
            "가거, 가겨, 가겨, 가겨마.",
            "가겨이요. 같 기예요.",
            "가는 사람, 간 사람, 갈 사람."
          ]
        }
      ];

      function createPlayItem(text, emoji) {
        const item = document.createElement("div");
        item.className = "play-item";

        const btn = document.createElement("button");
        btn.className = "play-btn";
        btn.type = "button";
        btn.textContent = "▶";
        btn.setAttribute("aria-label", `${text} 듣기`);
        btn.addEventListener("click", () => playText(text));

        const emojiEl = document.createElement("div");
        emojiEl.className = "emoji";
        emojiEl.textContent = emoji;

        const textEl = document.createElement("div");
        textEl.className = "play-text";
        textEl.textContent = text;

        item.appendChild(btn);
        item.appendChild(emojiEl);
        item.appendChild(textEl);

        return item;
      }

      function renderSections() {
        const container = document.getElementById("sectionsContainer");

        sections.forEach((section) => {
          const sectionEl = document.createElement("div");
          sectionEl.className = "section";

          const titleEl = document.createElement("h2");
          titleEl.textContent = section.title;

          const contentEl = document.createElement("div");
          contentEl.className = "section-content";

          section.items.forEach((item) => {
            contentEl.appendChild(createPlayItem(item, section.emoji));
          });

          sectionEl.appendChild(titleEl);
          sectionEl.appendChild(contentEl);
          container.appendChild(sectionEl);
        });
      }

      function playText(text) {
        if (!("speechSynthesis" in window)) {
          alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
          return;
        }

        const voices = window.speechSynthesis.getVoices();
        const koreanVoice = voices.find((voice) => /ko|kr/i.test(voice.lang)) || voices[0];

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ko-KR";
        utterance.rate = 0.7;
        utterance.pitch = 1.0;
        if (koreanVoice) {
          utterance.voice = koreanVoice;
        }

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      renderSections();
      const countLabel = document.getElementById("countLabel");
      countLabel.textContent = `${words.length}つの単語を表示します`;
    </script>
  </body>
</html>
